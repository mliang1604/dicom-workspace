<main class="gate">
  <section class="card">
    <strong class="brand">DICOM Workspace</strong>
    <h1>Before you continue</h1>
    <p class="notice">
      The open-source distribution of DICOM Workspace is not a certified medical device (CE or FDA).
      Any primary diagnostic use requires you to ensure full compliance with the laws and
      regulations applicable in your jurisdiction.
    </p>
    <div class="actions">
      <button type="button" class="decline" (click)="decline()">Decline</button>
      <button type="button" class="accept" (click)="acknowledge()">I acknowledge and accept</button>
    </div>
  </section>
</main>
