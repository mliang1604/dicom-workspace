name: Claude — implement labeled issues

# Add the `claude` label to an issue to have Claude implement it on a claude/
# branch and open a PR that closes the issue. Auto-merge is requested on the
# PR, so it lands once the required "Build & test" check passes.
#
# Gating on a label (rather than every opened issue) makes auto-implement
# explicit opt-in: only someone who can label the repo can trigger a run, and
# you retry a failed run by removing and re-adding the `claude` label.
#
# NOTE: auto-merge only waits for CI if `main` has a branch protection rule
# requiring the "Build & test" status check. Without that rule the PR merges
# as soon as it is created. Enable "Allow auto-merge" in repo settings too.
on:
  issues:
    # Fires when any label is added; the job filters for the `claude` label.
    types: [labeled]

# The action needs to push branches, open PRs, and comment on the issue.
# id-token: write lets the Claude GitHub App mint its OIDC token for GitHub auth.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

# One run per issue; don't cancel an in-flight implementation.
concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    name: Implement issue
    # Opt-in gate: only run when the `claude` label is the one just added.
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Implement the issue
        uses: anthropics/claude-code-action@v1
        with:
          # Authenticates the Claude model against your Pro/Max subscription
          # (no metered API billing). Generate the token with `claude setup-token`
          # and store it as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Stream Claude's full turn-by-turn output into the Actions job log
          # so runs are inspectable (otherwise the SDK output is summarized).
          show_full_output: true
          # Pass only the issue number (untrusted issue text is read via tools,
          # never interpolated into the prompt, to avoid prompt injection).
          prompt: |
            Issue #${{ github.event.issue.number }} in this repository was
            flagged for implementation. Read it with your GitHub tools first.

            Then implement it:
            1. Create a new branch named claude/issue-${{ github.event.issue.number }}.
            2. Make the change, following the conventions in CLAUDE.md and the
               surrounding code.
            3. Install dependencies with `npm ci` (never `npm install`, which
               rewrites package-lock.json on the runner and wastes turns).
               Run the production build and the unit tests; make them pass.
               Leave package-lock.json unchanged — do not stage or commit it.
            4. Open a pull request into main whose body contains
               "Closes #${{ github.event.issue.number }}".
            5. Enable auto-merge so it lands when checks pass:
               gh pr merge --auto --squash <pr-number>

            If the issue is ambiguous, infeasible, or out of scope, do NOT open
            a PR — comment on the issue explaining why and what you'd need.
          # --allowedTools grants the tools the run needs to actually implement
          # the issue: Bash (git/npm/gh), plus file read/edit. Without these the
          # action's agent mode denies them and the run does nothing.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
