name: CI

# Build and test every PR targeting main, so merges are gated on green checks.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs when a PR branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Production build also type-checks the app and templates.
      - name: Build (production)
        run: npx ng build --configuration production

      - name: Unit tests
        run: npx ng test --watch=false

  e2e:
    name: Browser smoke (Playwright)
    runs-on: ubuntu-latest
    # Non-blocking initially: headless WebGPU support on the runner is best-effort.
    # The test still covers the boot / disclaimer / load pipeline either way.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config starts the dev server itself (npm start) and waits for it.
      - name: Smoke test
        run: npx playwright test

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
